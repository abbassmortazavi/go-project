version: "3.9"

services:
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: lenseCode
    ports:
      - "5432:5432"


  adminer:
    image: adminer
    restart: always
    environment:
      ADMIN_DESIGN: dracula
    ports:
      - "3333:8080"